name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Prevent stacked deploys from wedging the Pages queue
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Push out/ to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          single-commit: true
